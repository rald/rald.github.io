<!DOCTYPE html>
<html>
	<head>
		<title></title>

		<style>
			html,body {
				font-family: san serif;
				font-size: 16pt;
			}
		</style>

	</head>
	<body>

		<audio id="player"></audio>
		<center>
			<span id="info"></span><br/>
			<span id="counter"></span><br/>
			<button onclick="play()"><img src="images/play.png" width="32px" height="32px"></button>
			<button onclick="pause()"><img src="images/pause.png" width="32px" height="32px"></button>
			<button onclick="stop()"><img src="images/stop.png" width="32px" height="32px"></button>
			<button onclick="prev()"><img src="images/prev.png" width="32px" height="32px"></button>
			<button onclick="next()"><img src="images/next.png" width="32px" height="32px"></button>
		</center>

		<div id="display"></div>

		<script>

var playlist=[
	"ang pagibig kong ito",
	"hindi ko kaya",
	"kung kailangan mo ako",
	"maybe",
	"sa ugoy ng duyan"
];

var player=document.getElementById("player");
var info=document.getElementById("info");
var counter=document.getElementById("counter");
var currentIndex=0;

function shuffle(array) {
	for (var i = array.length - 1; i > 0; i--) {
		var j = Math.floor(Math.random() * (i + 1));
		var temp = array[i];
		array[i] = array[j];
		array[j] = temp;
	}
}

function play() {
	player.play();
}

function pause() {
	player.pause();
}

function stop() {
	player.pause();
	player.currentTime=0;
}

function prev() {
	if(currentIndex>0) {
		currentIndex--;
	} else {
		currentIndex=playlist.length-1;
	}
	change();
}

function next() {
	if(currentIndex<playlist.length-1) {
		currentIndex++;
	} else {
		currentIndex=0;
	}
	change();
}

function change() {
	var currentSong=playlist[currentIndex];
	player.src="music/"+currentSong+".m4a";
	info.innerHTML=(currentIndex+1)+". "+currentSong;
	play();
}

function timer() {
	counter.innerHTML=
		toTime(player.currentTime)+" / "+
		toTime(player.duration);
}

function toTime(secs) {
	var sec_num = Math.floor(secs);
	var minutes = Math.floor(sec_num / 60);
	var seconds = sec_num - (minutes * 60);
	if (seconds < 10) seconds = "0"+seconds;
	return minutes+':'+seconds;
}

function jump(index) {
	currentIndex=index;
	change();
}

function list() {
	html="<table align='center' cellspacing='10px'>";
	for(var i=0;i<playlist.length;i++) {
		html+="<tr><td><a href='javascript:jump("+i+");'>"+(i+1)+". "+playlist[i]+"</a></td></tr>";
	}
	html+="</table>";
	display.innerHTML=html;
}

player.onended=next;
shuffle(playlist);
list();
change();
setInterval(timer,1000/60);

		</script>

	</body>
</html>
