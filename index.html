<!DOCTYPE html>
<html>
	<head>
		<title></title>
	</head>
	<body>

		<audio id="player"></audio>
		<center>
			<span id="info" style="font-family:san serif;font-size: 16pt;"></span><br/>
			<span id="counter" style="font-family:san serif;font-size: 16pt;"></span><br/>
			<button onclick="play()"><img src="images/play.png" width="32px" height="32px"></button>
			<button onclick="pause()"><img src="images/pause.png" width="32px" height="32px"></button>
			<button onclick="stop()"><img src="images/stop.png" width="32px" height="32px"></button>
			<button onclick="prev()"><img src="images/prev.png" width="32px" height="32px"></button>
			<button onclick="next()"><img src="images/next.png" width="32px" height="32px"></button>
		</center>

		<script>

var playlist=[
	"Jam Morales - Even If",
	"Geneva Cruz - Pangarap Ka",
	"Smokey Mountain - Kailan",
	"Tootsie Guevara - Mahal Ka Sa Akin"
];

var player=document.getElementById("player");
var info=document.getElementById("info");
var counter=document.getElementById("counter");
var currentIndex=0;

function play() {
	player.play();
}

function pause() {
	player.pause();
}

function stop() {
	player.pause();
	player.currentTime=0;
}

function prev() {
	if(currentIndex>0) {
		currentIndex--;
	} else {
		currentIndex=playlist.length-1;
	}
	change();
}

function next() {
	if(currentIndex<playlist.length-1) {
		currentIndex++;
	} else {
		currentIndex=0;
	}
	change();
}

function change() {
	var currentSong=playlist[currentIndex];
	player.src="music/"+currentSong+".mp3";
	info.innerHTML=(currentIndex+1)+". "+currentSong;
	play();
}

function timer() {
	counter.innerHTML=
		toTime(player.currentTime)+" / "+
		toTime(player.duration);
}

function toTime(secs) {
	var sec_num = Math.floor(secs);
	var minutes = Math.floor(sec_num / 60);
	var seconds = sec_num - (minutes * 60);
	if (seconds < 10) seconds = "0"+seconds;
	return minutes+':'+seconds;
}

player.onended=next;
change();
setInterval(timer,1000/60);

		</script>

	</body>
</html>
